version: '3.8'

services:
  # 🔍 OCR Service (Deactivated - Moving to Host Ollama for stability)
  # ocr-vlm:
  #   build:
  #     context: ./services/ocr-vlm
  #     dockerfile: Dockerfile
  #   ports:
  #     - "8082:8082"
  #   ... (Service commented out to save VRAM)

  # 🧠 LLM Inference (Deactivated - Using Host Ollama @ host.docker.internal)
  # llm-inference:
  #   image: ollama/ollama:latest
  #   ...

  # 🗄️ Vector Store (ChromaDB)
  vector-db:
    image: chromadb/chroma:0.4.24
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - PERSIST_DIRECTORY=/chroma/chroma
      - ALLOW_RESET=false
      - LOG_LEVEL=INFO
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - licitaciones-network
    restart: unless-stopped

  # 🗄️ Database (PostgreSQL)
  database:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=licitaciones
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - licitaciones-network
    restart: unless-stopped

  # 📬 Queue (Redis)
  queue-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - licitaciones-network
    restart: unless-stopped

  # ⚙️ Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    # workers=1 es CRÍTICO: mantiene el asyncio.Semaphore de VRAM en un solo proceso.
    # Sin --reload (modo producción estable).
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OCR_URL=http://host.docker.internal:11434
      - LLM_URL=http://host.docker.internal:11434
      - OLLAMA_URL=http://host.docker.internal:11434
      - VECTOR_DB_URL=http://vector-db:8000
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@database:5432/licitaciones
      - REDIS_URL=redis://queue-redis:6379
      - REDIS_HOST=queue-redis
      - MEMORY_BACKEND=postgres
      - OLLAMA_MODEL=licitai-coder
      - OLLAMA_NUM_CTX=12288
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - EXPERIENCE_LAYER_ENABLED=true
      - EXPERIENCE_PROMPT_INJECTION=true
      - EXPERIENCE_SHADOW_MODE=false
      - EXPERIENCE_API_ENABLED=true
      - EXPERIENCE_DEBUG=true
      - COMPLIANCE_BLOCK_EXTRA_RETRIES=3
      - COMPLIANCE_BLOCK_RETRY_DELAY_SEC=5
      - COMPLIANCE_CHUNK_CHARS=3000
      - COMPLIANCE_CHUNK_OVERLAP=300
      - COMPLIANCE_BLOCK_EMPTY_TIMEOUT_SEC=120
      - COMPLIANCE_ADAPTIVE_CHUNKING=true
      - COMPLIANCE_CHUNK_MIN=3000
      - COMPLIANCE_CHUNK_MAX=8000
      - COMPLIANCE_MAX_CONCURRENT_CHUNKS=1
    volumes:
      - C:/data:/data
      - ./logs:/app/logs
      - ./backend:/app
    depends_on:
      vector-db:
        condition: service_healthy
      database:
        condition: service_healthy
      queue-redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/health" ]
      interval: 60s
      timeout: 30s
      retries: 10
    networks:
      - licitaciones-network
    restart: unless-stopped

  # 🎨 Frontend React/Vite
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8504:8504"
    # El JS corre en el NAVEGADOR del host: debe apuntar al API publicado en el host (no al nombre Docker "backend").
    # 127.0.0.1 evita ::1/IPv6 que a veces rompe "localhost" con el backend en Docker.
    environment:
      - VITE_API_URL=http://127.0.0.1:8001/api/v1
      - LICITAI_PROXY_API_TARGET=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - licitaciones-network
    restart: unless-stopped

volumes:
  chroma_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  licitaciones-network:
    driver: bridge
