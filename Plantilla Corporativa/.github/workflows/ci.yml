name: CI Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip install pytest ruff mypy

      - name: Lint (ruff)
        run: |
          if [ -d backend ]; then ruff check backend; else ruff check .; fi

      - name: Typecheck (mypy)
        run: |
          if [ -d backend ]; then mypy backend --ignore-missing-imports; else mypy . --ignore-missing-imports; fi

      - name: Tests (pytest)
        run: |
          if [ -d backend ]; then cd backend && pytest -q; else pytest -q; fi
