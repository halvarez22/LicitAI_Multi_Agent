name: Backend Tests (pytest)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Unit & Behavior Tests
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/licitaciones
      VECTOR_DB_URL: http://localhost:8000
      OLLAMA_URL: http://localhost:11434
      ENVIRONMENT: test
      LOG_LEVEL: CRITICAL

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        working-directory: backend
        run: |
          # PYTHONPATH para asegurar que encuentre el paquete 'app'
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python -m pytest \
            tests/test_oracle.py \
            tests/test_submission_checklist.py \
            tests/test_post_clarification_service.py \
            tests/test_economic_validation_engine.py \
            tests/test_economic_validation_service.py \
            -v -q --tb=short
