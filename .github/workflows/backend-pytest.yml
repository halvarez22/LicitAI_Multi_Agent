# Pytest en Ubuntu: humo en cada PR/push; informe completo en cron y manual.
name: Backend Tests (pytest)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    # ~02:00 CDMX (invierno UTC-6) si el runner usa UTC; ajustar si hace falta
    - cron: "0 8 * * *"

concurrency:
  group: backend-pytest-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Obligatorio en PR/push: subconjunto estable (rápido, sin Docker Compose completo).
  pytest-smoke:
    name: Pytest smoke (gate)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/licitaciones
      REDIS_URL: redis://localhost:6379/0
      REDIS_HOST: localhost
      VECTOR_DB_URL: http://127.0.0.1:8000
      OLLAMA_URL: http://127.0.0.1:11434
      MEMORY_BACKEND: postgres
      ENVIRONMENT: test
      LOG_LEVEL: CRITICAL
      PYTHONPATH: ${{ github.workspace }}/backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: licitaciones
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pytest smoke
        working-directory: backend
        run: |
          python -m pytest \
            tests/test_oracle.py \
            tests/test_submission_checklist.py \
            tests/test_post_clarification_service.py \
            tests/test_economic_validation_engine.py \
            tests/test_economic_validation_service.py \
            -v -q --tb=short

  # Noche o manual: suite completa + JUnit (artefacto). No bloquea merge hasta que esté verde.
  pytest-full-report:
    name: Pytest full (informe)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/licitaciones
      REDIS_URL: redis://localhost:6379/0
      REDIS_HOST: localhost
      VECTOR_DB_URL: http://127.0.0.1:8000
      OLLAMA_URL: http://127.0.0.1:11434
      MEMORY_BACKEND: postgres
      ENVIRONMENT: test
      LOG_LEVEL: CRITICAL
      PYTHONPATH: ${{ github.workspace }}/backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: licitaciones
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pytest completo + JUnit
        working-directory: backend
        run: python -m pytest tests -q --tb=no --junitxml=pytest-junit.xml

      - name: Subir JUnit y log
        uses: actions/upload-artifact@v4
        with:
          name: pytest-full-${{ github.run_id }}
          path: |
            backend/pytest-junit.xml
          retention-days: 14
          if-no-files-found: ignore
